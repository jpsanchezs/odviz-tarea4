<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open Data Visualization Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { overflow: hidden; height: 100vh; }

    .topbar {
      height: 50px;
      padding: 0 20px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;

      display: flex;
      align-items: center;
    }

    .topbar a {
      text-decoration: none;
      color: #2563eb;
      font-weight: bold;
      font-size: 14px;
    } 

    .topbar a:hover {
      text-decoration: underline;
    }

    #split { width: 100vw; height: calc(100vh - 50px); }

    #svg-panel {
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      position: relative;
    }

    #svg-panel object {
      width: 100%;
      height: 100%;
      display: block;
    }

    #table-panel {
      background: #f5f5f5;
      padding: 15px;
      overflow: auto;
    }

    .gutter.gutter-vertical {
      background: #4a90e2;
      cursor: row-resize;
      height: 6px !important;
    }

    .gutter.gutter-vertical:hover { background: #357abd; }
  </style>
  <link rel="stylesheet" href="simple-table.css">
  <script src="https://cdn.jsdelivr.net/npm/split.js@1.6.5/dist/split.min.js"></script>
  <script src="simple-table.js"></script>
</head>
<body>
  <div class="topbar"> <a href="../index.html">Volver al inicio</a> </div>
  <div id="split">
    <div id="svg-panel">
      <object id="svg-object" type="image/svg+xml" data="./distribucion-sueno.svg"></object>
    </div>
    <div id="table-panel">
      <div id="tabla"></div>
    </div>
  </div>

  <script src="svg-controls.js"></script>
  <script>
    let table = null;
    let svgControl = null;
    let svgToRowId = new Map();

    function loadDataFromSVG() {
      const svgObject = document.getElementById('svg-object');

      svgObject.addEventListener('load', function() {
        const svgDoc = svgObject.contentDocument;
        if (!svgDoc) {
          console.error('Could not access SVG document');
          return;
        }

        svgToRowId.clear();

        const visualElements = svgDoc.querySelectorAll('[href]');
        visualElements.forEach(el => {
          const href = el.getAttribute('href');
          if (href && href.startsWith('#')) {
            const rowId = href.substring(1);
            if (el.id) {
              svgToRowId.set(el.id, rowId);
            }
          }
        });

        let factTable = null;
        const allTables = svgDoc.getElementsByTagName('v:table');
        for (let t of allTables) {
          if (t.getAttribute('visualization') === 'chart') {
            factTable = t;
            break;
          }
        }

        if (!factTable) {
          const tablesFallback = svgDoc.querySelectorAll('table');
          for (let t of tablesFallback) {
            if (t.getAttribute('visualization') === 'chart') {
              factTable = t;
              break;
            }
          }
        }

        if (!factTable) {
          console.error('<v:table visualization="chart"> not found');
          return;
        }

        const columnNames = factTable.getAttribute('columns').split(',').map(c => c.trim());
        const rows = factTable.getElementsByTagName('v:row');
        const data = [];

        for (let row of rows) {
          const rowId = row.getAttribute('id');
          const content = row.textContent.trim();
          const parts = content.split(',');
          const record = {};
          columnNames.forEach((col, idx) => {
            let val = parts[idx];
            record[col] = isNaN(val) ? val : parseFloat(val);
          });
          record['_rowId'] = rowId;
          data.push(record);
        }

        if (data.length === 0) {
          console.error('No data rows found');
          return;
        }

        const columns = Object.keys(data[0])
          .filter(k => k !== '_rowId')
          .map(key => ({
            field: key,
            title: key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
            width: (100 / (Object.keys(data[0]).length - 1)) + '%'
          }));

        table = new SimpleTable("tabla", {
          data: data,
          columns: columns,
          selectable: true,
          onRowSelect: (selectedRows) => {
            if (!svgControl) return;
            if (selectedRows.length === 1) {
              const rowId = selectedRows[0]._rowId;
              for (let [svgId, refRowId] of svgToRowId.entries()) {
                if (refRowId === rowId) {
                  svgControl.select(svgId);
                  break;
                }
              }
            } else if (selectedRows.length === 0) {
              svgControl.select(null);
            }
          }
        });

        const connectSVGControl = () => {
          if (svgObject.__SVGControl) {
            svgControl = svgObject.__SVGControl;
            svgControl.setCallback('select', (svgElement) => {
              if (!table) return;
              if (svgElement && svgToRowId.has(svgElement.id)) {
                const rowId = svgToRowId.get(svgElement.id);
                const targetRow = table.data.find(row => row._rowId === rowId);
                if (targetRow) {
                  table.selectedRows.clear();
                  table.selectedRows.add(targetRow);
                  table.render();
                }
              } else if (!svgElement) {
                table.selectedRows.clear();
                table.render();
              }
            });
          } else {
            setTimeout(connectSVGControl, 50);
          }
        };
        connectSVGControl();
      });
    }

    Split(["#svg-panel", "#table-panel"], {
      sizes: [50, 50],
      direction: "vertical",
      gutterSize: 6,
      minSize: [100, 150]
    });

    loadDataFromSVG();
  </script>
</body>
</html>
